<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cosmic Clicker</title>
    <style>
      body {
        align-items: center;
        background: #101820;
        color: #f8f4e3;
        display: flex;
        font-family: system-ui, sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      main {
        text-align: center;
      }

      button {
        background: #f2aa4c;
        border: 0;
        border-radius: 8px;
        color: #101820;
        cursor: pointer;
        font-size: 1.2rem;
        font-weight: 700;
        padding: 0.9rem 1.2rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cosmic Clicker</h1>
      <p>Score: <strong id="score">0</strong></p>
      <button id="button" type="button">Launch</button>
    </main>
    <script>
      let score = 0;
      document.getElementById("button").addEventListener("click", () => {
        score += 1;
        document.getElementById("score").textContent = String(score);
      });
    </script>
  </body>
</html>
