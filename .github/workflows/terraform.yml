name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - "lambdas/**"
      - "frontend/**"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "lambdas/**"
      - "frontend/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_WORKING_DIR: terraform/envs/prod
  # Inject non-default prod values. Keep in sync with terraform/envs/prod/terraform.tfvars
  # (gitignored). Add more TF_VAR_* entries here if you set new non-default values locally.
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_alarm_email: ${{ secrets.ALARM_EMAIL }}

jobs:
  terraform:
    name: Plan and Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            lambdas/package_processor/requirements.txt
            lambdas/package_processor/requirements-dev.txt

      - name: Install Lambda dev dependencies
        run: pip install -r lambdas/package_processor/requirements-dev.txt

      - name: Run Lambda tests
        run: pytest lambdas/package_processor/tests/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform fmt
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check -recursive

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.62.1

      - name: Cache tflint plugins
        uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('.tflint.hcl') }}

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --recursive

      - name: Run checkov
        run: pip install checkov && checkov --config-file .checkov.yml

      - name: Terraform init
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Terraform plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} plan \
            -input=false \
            -no-color \
            -out=tfplan \
            | tee plan.txt

      - name: Render plan for PR comment
        if: github.event_name == 'pull_request'
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} show -no-color tfplan > plan-show.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planRaw = fs.readFileSync('plan-show.txt', 'utf8');
            const MAX = 60000;
            const truncated = planRaw.length > MAX
              ? planRaw.slice(0, MAX) + `\n\n... (truncated ${planRaw.length - MAX} chars)`
              : planRaw;
            const body = `## Terraform Plan\n\n<details>\n<summary>Plan output</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body && c.body.startsWith('## Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -input=false -auto-approve tfplan

