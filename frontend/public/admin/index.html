<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin queue · Herzi Arcade</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Herzi Arcade · Admin</p>
        <h1>Pending review</h1>
      </div>
    </header>

    <main>
      <section id="logged-out" hidden>
        <p>Please <a id="login-link" class="play-link">log in</a> with an admin account.</p>
      </section>

      <section id="not-admin" hidden>
        <p>Your account is not in the admins group.</p>
      </section>

      <section id="logged-in" hidden>
        <p>Signed in as <strong id="email"></strong> · <a href="#" id="logout-link">Sign out</a></p>
        <div id="items"></div>
        <p id="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/auth.js"></script>
    <script src="/admin/admin.js"></script>
  </body>
</html>
